[schema]
name = "wine"
version = "0.1.0"
linkml = "1.7.0"

[files]
main = "schema/wine.yaml"

[publishing]
versions = []
edge = "main"
# Release reminder: when releasing the first version, flip `current`
# from "main" to the new tag (e.g., "main" -> "v0.1.0" in the v0.1.0
# release commit) so `/schema/current/` aliases to the new release.
# Also: append the new tag to `versions` above.
current = "main"
output_dir = "site/schema"
format = "html"
# Header brand/home link target. Our publish dir is site/schema/<version>/,
# so "../../" escapes back to the book root (works in both localhost dev
# and the github.io deploy). The panschema default "../current/" assumes a
# standalone schema-only deploy and is wrong for this book-nested layout.
site_root_url = "../../"
