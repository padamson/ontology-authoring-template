[book]
authors = ["Paul Adamson"]
language = "en"
src = "src"
title = "Building wine"
description = "Building the wine LinkML ontology from scratch, following Ontology Development 101 adapted to LinkML"

[build]
build-dir = "build"

[preprocessor]

[preprocessor.admonish]
command = "mdbook-admonish"
assets_version = "3.1.0" # do not edit: managed by `mdbook-admonish install`

[preprocessor.listings]
command = "mdbook-listings"
before = ["admonish", "links"]
number-listings = true

[output]

[output.html]
additional-css = ["./mdbook-admonish.css", "./mdbook-listings.css"]
additional-js = ["./mdbook-listings.js"]
